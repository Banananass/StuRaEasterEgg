name: Deploy via SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is needed so we can look up each tracked file's
          # real last-commit timestamp in the next step (a shallow clone
          # would make every file appear to have been "just changed").
          fetch-depth: 0

      - name: Restore file modification times from git history
        # actions/checkout sets every file's mtime to "now" (the checkout
        # time), since git itself does not store original commit
        # timestamps. Without this step, lftp's mirror (which decides what
        # to upload based on size/mtime) would see every single file as
        # "newer" than what's on the server on every run, and re-upload the
        # entire project each time instead of just the files that actually
        # changed. Restoring each file's mtime to its last commit date lets
        # lftp correctly skip files that are unchanged since the last
        # deploy.
        run: |
          while IFS= read -r -d '' file; do
            ts="$(git log -1 --format=%ct -- "$file" 2>/dev/null || true)"
            if [ -n "$ts" ]; then
              touch -d "@${ts}" "$file"
            fi
          done < <(git ls-files -z)

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy files to SFTP server
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          # Strip carriage returns and newlines from single-line secrets to guard
          # against accidentally stored secrets that contain embedded line breaks,
          # which would split lftp script lines and produce "Unknown command" errors.
          SFTP_HOST=$(tr -d '\r\n' <<< "${SFTP_HOST}")
          SFTP_PORT=$(tr -d '\r\n' <<< "${SFTP_PORT}")
          SFTP_USERNAME=$(tr -d '\r\n' <<< "${SFTP_USERNAME}")
          SFTP_PASSWORD=$(tr -d '\r\n' <<< "${SFTP_PASSWORD}")
          SFTP_REMOTE_DIR=$(tr -d '\r\n' <<< "${SFTP_REMOTE_DIR}")

          required_vars=(SFTP_HOST SFTP_USERNAME SFTP_REMOTE_DIR)
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: ${var}"
              exit 1
            fi
          done

          if [ -z "${SFTP_PASSWORD}" ] && [ -z "${SFTP_PRIVATE_KEY}" ]; then
            echo "::error::Set either SFTP_PASSWORD or SFTP_PRIVATE_KEY"
            exit 1
          fi

          umask 077
          lftp_script="${RUNNER_TEMP}/deploy.lftp"
          key_file=""

          cleanup() {
            if [ -n "${key_file}" ] && [ -e "${key_file}" ] && ! rm "${key_file}"; then
              echo "::warning::Failed to remove temporary SSH key file"
            fi
            if [ -e "${lftp_script}" ] && ! rm "${lftp_script}"; then
              echo "::warning::Failed to remove temporary lftp script"
            fi
          }
          trap cleanup EXIT

          lftp_escape() {
            local value="${1//\'/\'\\\'\'}"
            printf "'%s'" "${value}"
          }

          # Quote each pattern to prevent bash from glob-expanding the array
          # elements against the checkout directory (e.g. .git* → .git .github
          # .gitignore), which would break the intended exclude patterns.
          exclude_globs=('.git*' '.github' '.env*' '.npmrc' '*.pem' '*.key' '*.p12' '*.pfx' 'id_rsa*' 'id_ed25519*' 'credentials*' 'secrets*' '.aws')
          mirror_cmd="mirror -R --delete --verbose"
          for pattern in "${exclude_globs[@]}"; do
            mirror_cmd="${mirror_cmd} --exclude-glob ${pattern}"
          done
          mirror_cmd="${mirror_cmd} . ${SFTP_REMOTE_DIR}"

          {
            echo "set cmd:fail-exit yes"
            echo "set sftp:auto-confirm yes"

            if [ -n "${SFTP_PRIVATE_KEY}" ]; then
              key_file="$(mktemp "${RUNNER_TEMP}/sftp_key.XXXXXX")"
              printf '%s\n' "${SFTP_PRIVATE_KEY}" > "${key_file}"
              chmod 600 "${key_file}"
              echo "set sftp:connect-program \"ssh -a -x -i ${key_file}\""
              echo "open sftp://${SFTP_USERNAME}@${SFTP_HOST}:${SFTP_PORT:-22}"
            else
              echo "open sftp://${SFTP_HOST}:${SFTP_PORT:-22}"
              escaped_username="$(lftp_escape "${SFTP_USERNAME}")"
              escaped_password="$(lftp_escape "${SFTP_PASSWORD}")"
              printf 'user %s %s\n' "${escaped_username}" "${escaped_password}"
            fi

            echo "${mirror_cmd}"

            # Set sane permissions: 755 for directories, 644 for files.
            # IMPORTANT: do NOT make regular files executable. Many shared
            # hosts run PHP via suPHP/suexec, which refuses to execute PHP
            # scripts that have the group/world-executable bit set and
            # returns a generic "500 Internal Server Error" for them.
            #
            # "u=rwX,go=rX" is the standard chmod idiom for this: the
            # capital X only adds the executable bit for directories (or
            # files that already have it set), never for plain files - so
            # this is safe to run recursively over the actual remote tree
            # in a single command, without having to reconstruct locally
            # which files mirror did or didn't upload.
            echo "chmod -R u=rwX,go=rX ${SFTP_REMOTE_DIR}"

            echo "bye"
          } > "${lftp_script}"

          chmod 600 "${lftp_script}"
          lftp -f "${lftp_script}"
